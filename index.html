<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PyScript NumPy Graph</title>

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!-- Packages -->
    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            font-size: 18px;
            color: darkblue;
        }
    </style>
</head>

<body>

    <h1>NumPy + Matplotlib Demo</h1>

    <button py-click="run_demo">Generate Graph</button>

    <div id="output"></div>

    <py-script src="main.py"></py-script>

</body>
</html>
